# Visual Novel Commentary System Configuration

# LLM configuration
llm:
  provider: openai  # Options: gemini, ollama, openai
  providers:
    gemini:
      model: gemini-2.5-flash
      api_key: null
      disable_thinking: false
      generation_config:
        temperature: 0.7
    ollama:
      model: qwen2.5:32b
      base_url: http://localhost:11434
      timeout: 300.0
      disable_thinking: false
      generation_config:
        temperature: 0.7
    openai:
      model: Qwen/Qwen3-4B-Instruct-2507-FP8
      api_key: null
      base_url: http://localhost:8080/v1
      organization: null
      timeout: 60.0
      max_retries: 2
      disable_thinking: false
      generation_config:
        temperature: 0.7

# System prompt (optional - overrides default if specified)
system_prompt_file: vn_commentary/gatekeep_system_prompt.txt # Path to custom system prompt file

# Output settings
output:
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR
  save_results: true  # Save analysis results to JSON
  results_file: commentary_results.json

# Processing settings
processing:
  delay_between_dialogues: 0.0  # Delay in seconds between processing each dialogue (for rate limiting)
