# Visual Novel Commentary System Configuration

# LLM configuration
llm:
  provider: gemini  # Options: gemini, ollama, openai
  providers:
    gemini:
      model: gemini-2.5-flash
      api_key: null
      disable_thinking: false
      generation_config:
        temperature: 0.7
    ollama:
      model: qwen2.5:32b
      base_url: http://localhost:11434
      timeout: 300.0
      disable_thinking: false
      generation_config:
        temperature: 0.7
    openai:
      model: Qwen/Qwen3-4B-Instruct-2507-FP8
      api_key: null
      base_url: http://localhost:8080/v1
      organization: null
      timeout: 60.0
      max_retries: 2
      disable_thinking: false
      generation_config:
        temperature: 0.7

# Commentary analysis prompts
system_prompt_file: vn_commentary/prompts/gatekeep_system_prompt.txt # Path to gatekeep system prompt
user_prompt_file: vn_commentary/prompts/gatekeep_user_prompt.txt # Path to gatekeep user prompt template

# Summary generation settings
summary:
  enabled: true  # Enable/disable summary generation
  output_directory: null  # null = same dir as input, or specify path like "summaries/"
  system_prompt_file: vn_commentary/prompts/summary_system_prompt.txt
  user_prompt_file: vn_commentary/prompts/summary_user_prompt.txt
  include_reactions: true  # Include reaction metadata in summary context
  max_words: 300  # Suggested word limit for summaries

# Output settings
output:
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR
  save_results: true  # Save analysis results to JSON
  results_file: commentary_results.json

# Processing settings
processing:
  delay_between_dialogues: 0.0  # Delay in seconds between processing each dialogue (for rate limiting)
