<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili Live Chat - OBS Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        #chat-container {
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Regular messages */
        .message {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-in;
            max-width: 90%;
            word-wrap: break-word;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }

        .message-body {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        /* Superchat */
        .message.superchat {
            font-weight: bold;
            border-left: 4px solid #ff4500;
            max-width: 95%;
        }

        .sc-header-bar {
            padding: 6px 10px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sc-body-bar {
            padding: 6px 10px;
            border-radius: 0 0 8px 8px;
        }

        .sc-amount {
            color: #ffeb3b;
            font-size: 1.1em;
            margin-left: auto;
        }

        /* Gift */
        .message.gift {
            background: rgba(128, 0, 255, 0.4);
            border-left: 3px solid #e040fb;
        }

        .gift-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
        }

        .gift-text {
            color: #e8b0ff;
        }

        /* Guard */
        .message.guard {
            background: rgba(255, 87, 34, 0.5);
            border-left: 4px solid #ff5722;
            font-weight: bold;
            animation: guardPulse 0.5s ease-out, fadeIn 0.3s ease-in;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .badge-admin { background: #f44336; }
        .badge-guard-1 { background: linear-gradient(135deg, #ff6b35, #e53935); }
        .badge-guard-2 { background: linear-gradient(135deg, #ab47bc, #7b1fa2); }
        .badge-guard-3 { background: linear-gradient(135deg, #42a5f5, #1565c0); }
        .badge-medal { background: rgba(255,255,255,0.15); font-size: 0.65em; }

        .message-user {
            font-weight: bold;
            margin-right: 4px;
        }

        .message-content {
            display: inline;
            word-break: break-word;
        }

        .emoticon-img {
            max-width: 40px;
            max-height: 40px;
            vertical-align: middle;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes guardPulse {
            0% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .fading-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>

    <script>
        // URL parameters
        const params = new URLSearchParams(window.location.search);
        const showDanmaku = params.get('show_danmaku') !== 'false';
        const showSuperchat = params.get('show_superchat') !== 'false';
        const showGift = params.get('show_gift') !== 'false';
        const fontSize = parseInt(params.get('font_size')) || 16;
        const maxMessages = parseInt(params.get('max_messages')) || 20;

        document.body.style.fontSize = fontSize + 'px';

        const GUARD_NAMES = {1: '总督', 2: '提督', 3: '舰长'};

        let ws = null;
        let reconnectDelay = 1000;
        const maxReconnectDelay = 30000;
        let watchdogInterval = null;
        let lastActivityTime = Date.now();
        const WATCHDOG_CHECK_MS = 2000;
        const WATCHDOG_MS = 15000;
        const seenIds = new Set();
        let reconnectTimer = null;
        let isConnecting = false;

        const chatContainer = document.getElementById('chat-container');

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function renderSegments(segments) {
            if (!Array.isArray(segments) || segments.length === 0) return '';
            let html = '';
            for (const seg of segments) {
                if (!seg || typeof seg !== 'object') continue;
                const t = seg.type;
                if (t === 'text') {
                    html += escapeHtml(seg.text || '');
                } else if (t === 'emoticon' && seg.url) {
                    const title = seg.text ? ` title="${escapeHtml(seg.text)}"` : '';
                    html += `<img class="emoticon-img" src="${escapeHtml(seg.url)}" loading="lazy" referrerpolicy="no-referrer"${title}>`;
                } else {
                    if (seg.text) html += escapeHtml(seg.text);
                }
            }
            return html;
        }

        function badgesHtml(msg) {
            let h = '';
            if (msg.admin) h += '<span class="badge badge-admin">房管</span>';
            const gl = msg.guard_level || msg.privilege_type || 0;
            if (gl === 1) h += '<span class="badge badge-guard-1">总督</span>';
            else if (gl === 2) h += '<span class="badge badge-guard-2">提督</span>';
            else if (gl === 3) h += '<span class="badge badge-guard-3">舰长</span>';
            if (msg.medal && msg.medal.name) {
                h += `<span class="badge badge-medal">${escapeHtml(msg.medal.name)} ${msg.medal.level}</span>`;
            }
            return h;
        }

        function avatarEl(face) {
            if (!face) return '';
            return `<img class="message-avatar" src="${escapeHtml(face)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`;
        }

        function addElement(div) {
            chatContainer.appendChild(div);
            while (chatContainer.children.length > maxMessages) {
                const first = chatContainer.firstChild;
                first.classList.add('fading-out');
                setTimeout(() => { if (first.parentNode) first.remove(); }, 500);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ====================================================================
        // Renderers
        // ====================================================================
        function renderDanmaku(msg) {
            const div = document.createElement('div');
            div.className = 'message';

            let content;
            if (msg.segments && msg.segments.length) {
                content = renderSegments(msg.segments);
            } else if (msg.dm_type === 1 && msg.emoticon_url) {
                content = `<img class="emoticon-img" src="${escapeHtml(msg.emoticon_url)}" loading="lazy" referrerpolicy="no-referrer">`;
            } else {
                content = escapeHtml(msg.content);
            }

            div.innerHTML = `
                ${avatarEl(msg.face)}
                <div class="message-body">
                    <div class="message-header">
                        ${badgesHtml(msg)}
                        <span class="message-user">${escapeHtml(msg.user)}:</span>
                    </div>
                    <span class="message-content">${content}</span>
                </div>
            `;
            addElement(div);
        }

        function renderSuperchat(msg) {
            const div = document.createElement('div');
            div.className = 'message superchat';
            if (msg.bili_id) div.dataset.scId = msg.bili_id;

            const bg = msg.background_color || '#e69138';
            const bgBottom = msg.background_bottom_color || '#d5831b';

            div.innerHTML = `
                ${avatarEl(msg.face)}
                <div class="message-body">
                    <div class="sc-header-bar" style="background:${escapeHtml(bg)}">
                        ${badgesHtml(msg)}
                        <span class="message-user">${escapeHtml(msg.user)}</span>
                        <span class="sc-amount">&#165;${msg.amount}</span>
                    </div>
                    <div class="sc-body-bar" style="background:${escapeHtml(bgBottom)}">
                        ${escapeHtml(msg.content)}
                        ${msg.message_trans ? `<div style="font-size:0.85em;opacity:0.8;margin-top:2px">${escapeHtml(msg.message_trans)}</div>` : ''}
                    </div>
                </div>
            `;
            addElement(div);
        }

        function renderGift(msg) {
            const div = document.createElement('div');
            div.className = 'message gift';

            const icon = msg.gift_icon
                ? `<img class="gift-icon" src="${escapeHtml(msg.gift_icon)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                : '';

            div.innerHTML = `
                ${avatarEl(msg.face)}
                <div class="message-body">
                    <span class="message-user" style="color:#e8b0ff">${escapeHtml(msg.user)}</span>
                    <span class="gift-text">${escapeHtml(msg.action || '赠送')} ${icon} ${escapeHtml(msg.gift_name)} x${msg.num}</span>
                </div>
            `;
            addElement(div);
        }

        function renderGuard(msg) {
            const div = document.createElement('div');
            div.className = 'message guard';

            const guardName = GUARD_NAMES[msg.guard_level] || 'guard';

            div.innerHTML = `
                <div class="message-body">
                    <span class="badge badge-guard-${msg.guard_level}">${guardName}</span>
                    <span class="message-user" style="color:#ff9800">${escapeHtml(msg.user)}</span>
                    <span>${msg.toast_msg ? escapeHtml(msg.toast_msg) : `开通了 ${guardName}`}</span>
                </div>
            `;
            addElement(div);
        }

        function handleSuperchatDelete(data) {
            (data.ids || []).forEach(id => {
                const el = document.querySelector(`[data-sc-id="${id}"]`);
                if (el) {
                    el.classList.add('fading-out');
                    setTimeout(() => { if (el.parentNode) el.remove(); }, 500);
                }
            });
        }

        // ====================================================================
        // Snapshot hydration (so refresh doesn't lose history)
        // ====================================================================
        async function loadSnapshot() {
            try {
                const res = await fetch('/chat');
                const snapshot = await res.json();

                const items = [];
                if (showDanmaku) {
                    for (const m of (snapshot.danmaku || [])) items.push({ type: 'danmaku', data: m });
                }
                if (showSuperchat) {
                    for (const m of (snapshot.superchat || [])) items.push({ type: 'superchat', data: m });
                }
                if (showGift) {
                    for (const m of (snapshot.gift || [])) items.push({ type: 'gift', data: m });
                }

                items.sort((a, b) => (a.data.timestamp || 0) - (b.data.timestamp || 0));

                // Keep only the last maxMessages items
                const sliced = items.slice(Math.max(0, items.length - maxMessages));

                for (const it of sliced) {
                    const msg = it.data || {};
                    if (msg.id && seenIds.has(msg.id)) continue;
                    if (msg.id) seenIds.add(msg.id);

                    if (it.type === 'danmaku') {
                        renderDanmaku(msg);
                    } else if (it.type === 'superchat') {
                        renderSuperchat(msg);
                    } else if (it.type === 'gift') {
                        const pt = msg.paid_type;
                        if (pt === 'guard') renderGuard(msg);
                        else renderGift(msg);
                    }
                }
            } catch (e) {
                console.warn('Failed to load snapshot:', e);
            }
        }

        // ====================================================================
        // WebSocket
        // ====================================================================

        function scheduleConnect() {
            if (reconnectTimer !== null) return;
            const delay = reconnectDelay;
            reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connect();
            }, delay);
        }

        // Force an immediate reconnect, cancelling any pending timer.
        // Used by visibilitychange / pageshow to recover from OBS scene switches
        // where JS timers may have been throttled or the socket stuck in CONNECTING.
        function forceReconnect() {
            if (reconnectTimer !== null) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            reconnectDelay = 1000;
            if (ws && ws.readyState === WebSocket.OPEN) return;
            // If stuck in CONNECTING, detach handlers and let the stale socket die quietly.
            if (ws && ws.readyState !== WebSocket.CLOSED) {
                const stale = ws;
                ws = null;
                stale.onclose = null;
                stale.onerror = null;
                stale.onmessage = null;
                stale.close();
            }
            connect();
        }

        async function connect() {
            // Guard: skip if a connection is already live or being established.
            if (isConnecting) return;
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
            isConnecting = true;

            // Catch up on anything missed while disconnected. seenIds dedupes
            // against already-rendered messages, so this is safe on reconnect.
            await loadSnapshot();

            const wsProto = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
            const sock = new WebSocket(`${wsProto}//${window.location.host}/ws/stream`);
            ws = sock;
            isConnecting = false;

            // If the socket stays CONNECTING for too long (OBS throttling network I/O
            // while in the background), close it so onclose fires and schedules a retry.
            const connectTimeout = setTimeout(() => {
                if (sock.readyState === WebSocket.CONNECTING) {
                    console.warn('WebSocket connect timeout, retrying...');
                    sock.close();
                }
            }, 10000);

            sock.onopen = () => {
                clearTimeout(connectTimeout);
                if (sock !== ws) { sock.close(); return; }
                reconnectDelay = 1000;
                lastActivityTime = Date.now();
                const channels = [];
                if (showDanmaku) channels.push('danmaku');
                if (showSuperchat) channels.push('superchat');
                if (showGift) channels.push('gift');

                sock.send(JSON.stringify({ type: 'subscribe', channels }));

                // Server broadcasts a heartbeat every ~5s; if nothing arrives
                // for WATCHDOG_MS, force a reconnect.
                if (watchdogInterval) clearInterval(watchdogInterval);
                watchdogInterval = setInterval(() => {
                    if (sock !== ws) { clearInterval(watchdogInterval); return; }
                    if (Date.now() - lastActivityTime > WATCHDOG_MS) {
                        console.warn('WebSocket watchdog: no activity, forcing reconnect');
                        sock.close();
                    }
                }, WATCHDOG_CHECK_MS);
            };

            sock.onmessage = (event) => {
                if (sock !== ws) return;
                lastActivityTime = Date.now();
                const data = JSON.parse(event.data);

                switch (data.type) {
                    case 'danmaku':
                        if (showDanmaku) {
                            if (data.data?.id && seenIds.has(data.data.id)) break;
                            if (data.data?.id) seenIds.add(data.data.id);
                            renderDanmaku(data.data);
                        }
                        break;
                    case 'superchat':
                        if (showSuperchat) {
                            if (data.data?.id && seenIds.has(data.data.id)) break;
                            if (data.data?.id) seenIds.add(data.data.id);
                            renderSuperchat(data.data);
                        }
                        break;
                    case 'gift':
                        if (showGift) {
                            if (data.data?.id && seenIds.has(data.data.id)) break;
                            if (data.data?.id) seenIds.add(data.data.id);
                            renderGift(data.data);
                        }
                        break;
                    case 'guard':
                        if (showGift) {
                            if (data.data?.id && seenIds.has(data.data.id)) break;
                            if (data.data?.id) seenIds.add(data.data.id);
                            renderGuard(data.data);
                        }
                        break;
                    case 'superchat_delete':
                        handleSuperchatDelete(data.data);
                        break;
                    case 'state_changed':
                        break;
                }
            };

            sock.onclose = (ev) => {
                clearTimeout(connectTimeout);
                if (watchdogInterval) { clearInterval(watchdogInterval); watchdogInterval = null; }
                try {
                    console.warn('WebSocket closed', { code: ev?.code, reason: ev?.reason, wasClean: ev?.wasClean });
                } catch (e) {}
                // Only schedule if this is still the active socket (avoid stale-socket loops).
                if (sock === ws) scheduleConnect();
            };

            sock.onerror = (error) => {
                if (sock !== ws) return;
                console.error('WebSocket error:', error);
            };
        }

        // OBS fires visibilitychange when a scene becomes active/inactive.
        // forceReconnect handles all readyState values, including CONNECTING,
        // which the old check missed when JS timers were throttled while hidden.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') forceReconnect();
        });

        // pageshow fires when OBS restores the page from the back-forward cache
        // (persisted=true) — visibilitychange alone may not fire in that case.
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) forceReconnect();
        });

        // When OBS regains focus after being in the background, the scene stays
        // "visible" the whole time so visibilitychange never fires. Reconnect here
        // in case the server dropped the connection while OBS was backgrounded.
        window.addEventListener('focus', () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) forceReconnect();
        });

        connect();
    </script>
</body>
</html>
