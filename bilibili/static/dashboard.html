<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili Live Chat Service - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 30px;
            color: #00d9ff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #00d9ff;
            font-size: 1.2em;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.connected {
            background: #4caf50;
        }

        .status-indicator.disconnected {
            background: #f44336;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-value {
            font-weight: bold;
            color: #00d9ff;
        }

        .room-id-clickable {
            cursor: text;
            user-select: none;
        }

        .room-id-input {
            width: 100%;
            background: transparent;
            color: #eee;
            border: none;
            border-bottom: 1px solid rgba(0, 217, 255, 0.7);
            border-radius: 0;
            padding: 0;
            outline: none;
            font-weight: 700;
            font-size: 1.05em;
            letter-spacing: 0.2px;
            text-align: right;
        }

        .room-id-input:focus {
            border-bottom-color: #00d9ff;
            box-shadow: none;
        }

        /* Hide number input spinners (OBS/Chromium + Firefox) */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        button {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-btn {
            background: #555;
        }

        .toggle-btn.active {
            background: #4caf50;
        }

        /* Chat viewer */
        #chat-viewer {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
        }

        #chat-viewer.scroll-paused {
            border: 2px solid #ff9800;
        }

        .scroll-notice {
            display: none;
            text-align: center;
            padding: 8px;
            background: #ff9800;
            color: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .scroll-notice.visible {
            display: block;
        }

        /* Chat messages */
        .chat-message {
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a2e;
            border-radius: 8px;
            border-left: 3px solid #00d9ff;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .chat-message.superchat {
            border-left-color: #ffeb3b;
        }

        .chat-message.gift {
            border-left-color: #e040fb;
            background: #2a1a3e;
        }

        .chat-message.guard {
            border-left-color: #ff5722;
            background: linear-gradient(135deg, #2e1a00, #1a1a2e);
            border-width: 4px;
        }

        .chat-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            background: #2a2a4a;
        }

        .chat-body {
            flex: 1;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .chat-user {
            font-weight: bold;
            color: #00d9ff;
        }

        .chat-message.guard .chat-user {
            color: #ff5722;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.75em;
            font-weight: bold;
            vertical-align: middle;
        }

        .badge-admin {
            background: #f44336;
            color: #fff;
        }

        .badge-guard-1 {
            background: linear-gradient(135deg, #ff6b35, #e53935);
            color: #fff;
        }

        .badge-guard-2 {
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
            color: #fff;
        }

        .badge-guard-3 {
            background: linear-gradient(135deg, #42a5f5, #1565c0);
            color: #fff;
        }

        .badge-medal {
            background: #2a2a4a;
            color: #aaa;
            border: 1px solid #444;
        }

        /* Superchat styling */
        .sc-container {
            border-radius: 8px;
            overflow: hidden;
        }

        .sc-header {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sc-body {
            padding: 8px 12px;
        }

        .sc-amount {
            color: #ffeb3b;
            font-weight: bold;
            font-size: 1.1em;
        }

        .sc-timer {
            font-size: 0.8em;
            opacity: 0.8;
            margin-left: auto;
        }

        /* Gift styling */
        .gift-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }

        .gift-info {
            color: #e040fb;
        }

        .chat-content {
            color: #eee;
            word-break: break-word;
        }

        .chat-time {
            font-size: 0.8em;
            color: #888;
            margin-left: auto;
            flex-shrink: 0;
        }

        .emoticon-img {
            max-width: 48px;
            max-height: 48px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bilibili Live Chat Service</h1>

        <div class="grid">
            <!-- Status Card -->
            <div class="card">
                <h2>Service Status</h2>
                <div class="stat-row">
                    <span>Connection:</span>
                    <span>
                        <span class="status-indicator" id="status-indicator"></span>
                        <span id="connection-status">Loading...</span>
                    </span>
                </div>
                <div class="stat-row">
                    <span>Room ID:</span>
                    <div style="flex:1; min-width:0; display:flex; justify-content:flex-end;">
                        <span id="room-id-text" class="stat-value room-id-clickable" onclick="startEditRoomId()">-</span>
                        <input id="room-id-input" class="room-id-input" type="number" min="1" inputmode="numeric" placeholder="" style="display:none; max-width: 220px;">
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <button id="connect-btn" onclick="doConnect()">Connect</button>
                    <button id="disconnect-btn" onclick="doDisconnect()">Disconnect</button>
                </div>
            </div>

            <!-- Statistics Card -->
            <div class="card">
                <h2>Statistics</h2>
                <div class="stat-row">
                    <span>Danmaku:</span>
                    <span class="stat-value" id="danmaku-count">0</span>
                </div>
                <div class="stat-row">
                    <span>Paid (SC/Gift/Guard):</span>
                    <span class="stat-value" id="paid-count">0</span>
                </div>
                <div class="stat-row">
                    <span>Total Gift Coins:</span>
                    <span class="stat-value" id="total-gift-coins">0</span>
                </div>
                <div class="stat-row">
                    <span>Uptime:</span>
                    <span class="stat-value" id="uptime">0s</span>
                </div>
            </div>

            <!-- Controls Card removed: service always processes all messages -->
        </div>

        <!-- Chat Viewer -->
        <div class="card">
            <h2>Live Chat</h2>
            <div class="scroll-notice" id="scroll-notice" onclick="resumeScroll()">
                Auto-scroll paused - click to resume
            </div>
            <div id="chat-viewer"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectDelay = 1000;
        const maxReconnectDelay = 30000;
        let autoScroll = true;
        const seenIds = new Set();
        let currentRoomId = null;
        let switchingRoom = false;
        let lastKnownRoomId = null;

        const GUARD_NAMES = {1: '总督', 2: '提督', 3: '舰长'};
        // ====================================================================
        // Init
        // ====================================================================
        async function init() {
            await updateState();
            await updateStats();
            await loadSnapshot();
            setupRoomIdEditor();
            connectWebSocket();
            setInterval(updateStats, 5000);
            setupScrollPause();
        }

        async function loadSnapshot() {
            try {
                const res = await fetch('/chat');
                const snapshot = await res.json();

                const items = [];
                for (const m of (snapshot.danmaku || [])) items.push({ type: 'danmaku', data: m });
                for (const m of (snapshot.paid || [])) items.push({ type: 'paid', data: m });

                // Render in chronological order
                items.sort((a, b) => (a.data.timestamp || 0) - (b.data.timestamp || 0));

                for (const it of items) {
                    const msg = it.data || {};
                    if (msg.id && seenIds.has(msg.id)) continue;
                    if (msg.id) seenIds.add(msg.id);

                    if (it.type === 'danmaku') {
                        addDanmakuMessage(msg);
                    } else if (it.type === 'paid') {
                        const paidType = msg.paid_type;
                        if (paidType === 'superchat') addSuperChatMessage(msg);
                        else if (paidType === 'gift') addGiftMessage(msg);
                        else if (paidType === 'guard') addGuardMessage(msg);
                    }
                }
            } catch (e) {
                console.warn('Failed to load snapshot:', e);
            }
        }

        // ====================================================================
        // Scroll pause on hover
        // ====================================================================
        function setupScrollPause() {
            const viewer = document.getElementById('chat-viewer');
            viewer.addEventListener('mouseenter', () => {
                // Only pause if user has scrolled up
            });
            viewer.addEventListener('scroll', () => {
                const el = viewer;
                const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
                if (!atBottom) {
                    autoScroll = false;
                    document.getElementById('scroll-notice').classList.add('visible');
                    el.classList.add('scroll-paused');
                } else {
                    autoScroll = true;
                    document.getElementById('scroll-notice').classList.remove('visible');
                    el.classList.remove('scroll-paused');
                }
            });
        }

        function resumeScroll() {
            autoScroll = true;
            const viewer = document.getElementById('chat-viewer');
            viewer.scrollTop = viewer.scrollHeight;
            document.getElementById('scroll-notice').classList.remove('visible');
            viewer.classList.remove('scroll-paused');
        }

        // ====================================================================
        // State & Stats
        // ====================================================================
        async function updateState() {
            try {
                const res = await fetch('/state');
                const state = await res.json();

                document.getElementById('connection-status').textContent = state.connected ? 'Connected' : 'Disconnected';
                document.getElementById('status-indicator').className = 'status-indicator ' + (state.connected ? 'connected' : 'disconnected');
                currentRoomId = state.room_id;
                lastKnownRoomId = state.room_id;
                document.getElementById('room-id-text').textContent = String(state.room_id ?? '-');
                const input = document.getElementById('room-id-input');
                // Don't clobber the user's typing
                if (document.activeElement !== input) {
                    input.value = String(state.room_id ?? '');
                }
            } catch (e) {
                console.error('Failed to update state:', e);
            }
        }

        async function updateStats() {
            try {
                const res = await fetch('/stats');
                const stats = await res.json();

                document.getElementById('danmaku-count').textContent = stats.total_danmaku_received;
                document.getElementById('paid-count').textContent = stats.total_paid_received;
                document.getElementById('total-gift-coins').textContent = formatNumber(stats.total_gift_coins);
                document.getElementById('uptime').textContent = formatUptime(stats.uptime_seconds);
            } catch (e) {
                console.error('Failed to update stats:', e);
            }
        }

        function formatNumber(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toLocaleString();
        }

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // ====================================================================
        // Controls
        // ====================================================================
        async function doConnect() {
            try {
                await fetch('/connect', { method: 'POST' });
                await updateState();
            } catch (e) {
                console.error('Failed to connect:', e);
            }
        }

        async function doDisconnect() {
            try {
                await fetch('/disconnect', { method: 'POST' });
                await updateState();
            } catch (e) {
                console.error('Failed to disconnect:', e);
            }
        }

        function setupRoomIdEditor() {
            const input = document.getElementById('room-id-input');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    doSwitchRoom();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelEditRoomId();
                }
            });

            // Do NOT auto-switch on blur; only switch on Enter (requested).
            input.addEventListener('blur', () => {
                cancelEditRoomId();
            });
        }

        function startEditRoomId() {
            if (switchingRoom) return;
            const roomText = document.getElementById('room-id-text');
            const input = document.getElementById('room-id-input');
            roomText.style.display = 'none';
            input.style.display = 'block';
            input.value = String(currentRoomId ?? lastKnownRoomId ?? '');
            input.focus();
            input.select();
        }

        function cancelEditRoomId() {
            const roomText = document.getElementById('room-id-text');
            const input = document.getElementById('room-id-input');
            input.style.display = 'none';
            roomText.style.display = 'inline';
            // Restore the known room id in the input for next edit
            input.value = String(currentRoomId ?? lastKnownRoomId ?? '');
        }

        async function doSwitchRoom() {
            if (switchingRoom) return;
            try {
                const input = document.getElementById('room-id-input');
                const roomId = parseInt(input.value, 10);
                if (!roomId || roomId <= 0) {
                    cancelEditRoomId();
                    return;
                }

                // Always clear history and reconnect (requested behavior)
                const clearBuffers = true;
                const reconnect = true;

                switchingRoom = true;
                input.disabled = true;

                const res = await fetch('/room/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room_id: roomId, reconnect, clear_buffers: clearBuffers })
                });

                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text || `HTTP ${res.status}`);
                }

                // Update state + stats + chat view after switch
                await updateState();
                await updateStats();

                // Always clear UI and dedupe cache (requested behavior)
                document.getElementById('chat-viewer').innerHTML = '';
                seenIds.clear();
                await loadSnapshot();

                // Exit edit mode on success
                const roomText = document.getElementById('room-id-text');
                roomText.style.display = 'inline';
                input.style.display = 'none';
            } catch (e) {
                console.error('Failed to switch room:', e);
                alert('Failed to switch room. Check server logs for details.');
            } finally {
                switchingRoom = false;
                const input = document.getElementById('room-id-input');
                if (input) input.disabled = false;
            }
        }

        // Processing toggles removed: service always processes all messages.

        // ====================================================================
        // WebSocket
        // ====================================================================
        function connectWebSocket() {
            const wsProto = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
            const wsUrl = `${wsProto}//${window.location.host}/ws/stream`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                reconnectDelay = 1000;
                ws.send(JSON.stringify({
                    type: 'subscribe',
                    channels: ['danmaku', 'paid']
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'danmaku') {
                    if (data.data?.id && seenIds.has(data.data.id)) return;
                    if (data.data?.id) seenIds.add(data.data.id);
                    addDanmakuMessage(data.data);
                } else if (data.type === 'paid') {
                    if (data.data?.id && seenIds.has(data.data.id)) return;
                    if (data.data?.id) seenIds.add(data.data.id);
                    const paidType = data.data.paid_type;
                    if (paidType === 'superchat') addSuperChatMessage(data.data);
                    else if (paidType === 'gift') addGiftMessage(data.data);
                    else if (paidType === 'guard') addGuardMessage(data.data);
                } else if (data.type === 'superchat_delete') {
                    handleSuperchatDelete(data.data);
                } else if (data.type === 'state_changed') {
                    updateState();
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            };
        }

        // ====================================================================
        // Message rendering helpers
        // ====================================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderSegments(segments) {
            if (!Array.isArray(segments) || segments.length === 0) return '';
            let html = '';
            for (const seg of segments) {
                if (!seg || typeof seg !== 'object') continue;
                const t = seg.type;
                if (t === 'text') {
                    html += escapeHtml(seg.text || '');
                } else if (t === 'emoticon' && seg.url) {
                    const title = seg.text ? ` title="${escapeHtml(seg.text)}"` : '';
                    html += `<img class="emoticon-img" src="${escapeHtml(seg.url)}" loading="lazy" referrerpolicy="no-referrer"${title}>`;
                } else {
                    // Fallback for unknown segments
                    if (seg.text) html += escapeHtml(seg.text);
                }
            }
            return html;
        }

        function makeBadges(msg) {
            let html = '';
            if (msg.admin) {
                html += '<span class="badge badge-admin">房管</span>';
            }
            const gl = msg.guard_level || msg.privilege_type || 0;
            if (gl === 1) html += '<span class="badge badge-guard-1">总督</span>';
            else if (gl === 2) html += '<span class="badge badge-guard-2">提督</span>';
            else if (gl === 3) html += '<span class="badge badge-guard-3">舰长</span>';

            if (msg.medal && msg.medal.name) {
                html += `<span class="badge badge-medal">${escapeHtml(msg.medal.name)} ${msg.medal.level}</span>`;
            }
            return html;
        }

        function avatarHtml(face) {
            if (face) {
                return `<img class="chat-avatar" src="${escapeHtml(face)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`;
            }
            return '';
        }

        function timeStr(ts) {
            return new Date(ts * 1000).toLocaleTimeString();
        }

        function appendMessage(div) {
            const chatViewer = document.getElementById('chat-viewer');
            chatViewer.appendChild(div);
            if (autoScroll) {
                chatViewer.scrollTop = chatViewer.scrollHeight;
            }
            // Limit to 200 messages
            while (chatViewer.children.length > 200) {
                chatViewer.removeChild(chatViewer.firstChild);
            }
        }

        // ====================================================================
        // Message type renderers
        // ====================================================================
        function addDanmakuMessage(msg) {
            const div = document.createElement('div');
            div.className = 'chat-message';

            let contentHtml;
            if (msg.segments && msg.segments.length) {
                contentHtml = renderSegments(msg.segments);
            } else if (msg.dm_type === 1 && msg.emoticon_url) {
                contentHtml = `<img class="emoticon-img" src="${escapeHtml(msg.emoticon_url)}" loading="lazy" referrerpolicy="no-referrer">`;
            } else {
                contentHtml = escapeHtml(msg.content);
            }

            div.innerHTML = `
                ${avatarHtml(msg.face)}
                <div class="chat-body">
                    <div class="chat-header">
                        ${makeBadges(msg)}
                        <span class="chat-user">${escapeHtml(msg.user)}</span>
                        <span class="chat-time">${timeStr(msg.timestamp)}</span>
                    </div>
                    <div class="chat-content">${contentHtml}</div>
                </div>
            `;
            appendMessage(div);
        }

        function addSuperChatMessage(msg) {
            const div = document.createElement('div');
            div.className = 'chat-message superchat';
            if (msg.bili_id) div.dataset.scId = msg.bili_id;

            const bgColor = msg.background_color || '#e69138';
            const bgBottom = msg.background_bottom_color || '#d5831b';

            div.innerHTML = `
                ${avatarHtml(msg.face)}
                <div class="chat-body">
                    <div class="sc-container">
                        <div class="sc-header" style="background:${escapeHtml(bgColor)}">
                            ${makeBadges(msg)}
                            <span class="chat-user" style="color:#fff">${escapeHtml(msg.user)}</span>
                            <span class="sc-amount">&#165;${msg.amount}</span>
                            <span class="chat-time">${timeStr(msg.timestamp)}</span>
                        </div>
                        <div class="sc-body" style="background:${escapeHtml(bgBottom)}">
                            <div class="chat-content" style="color:#fff">${escapeHtml(msg.content)}</div>
                            ${msg.message_trans ? `<div style="font-size:0.85em;opacity:0.8;margin-top:4px;color:#fff">${escapeHtml(msg.message_trans)}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
            appendMessage(div);
        }

        function addGiftMessage(msg) {
            const div = document.createElement('div');
            div.className = 'chat-message gift';

            const iconHtml = msg.gift_icon
                ? `<img class="gift-icon" src="${escapeHtml(msg.gift_icon)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                : '';

            const coinLabel = msg.coin_type === 'gold' ? '金瓜子' : '银瓜子';

            div.innerHTML = `
                ${avatarHtml(msg.face)}
                <div class="chat-body">
                    <div class="chat-header">
                        ${makeBadges(msg)}
                        <span class="chat-user" style="color:#e040fb">${escapeHtml(msg.user)}</span>
                        <span class="chat-time">${timeStr(msg.timestamp)}</span>
                    </div>
                    <div class="gift-info">
                        ${escapeHtml(msg.action || '赠送')} ${iconHtml} ${escapeHtml(msg.gift_name)} x${msg.num}
                        <span style="opacity:0.7;font-size:0.85em">(${msg.total_coin} ${coinLabel})</span>
                    </div>
                </div>
            `;
            appendMessage(div);
        }

        function addGuardMessage(msg) {
            const div = document.createElement('div');
            div.className = 'chat-message guard';

            const guardName = GUARD_NAMES[msg.guard_level] || `guard_${msg.guard_level}`;

            div.innerHTML = `
                <div class="chat-body">
                    <div class="chat-header">
                        <span class="badge badge-guard-${msg.guard_level}">${guardName}</span>
                        <span class="chat-user">${escapeHtml(msg.user)}</span>
                        <span class="chat-time">${timeStr(msg.timestamp)}</span>
                    </div>
                    <div class="chat-content" style="color:#ff9800">
                        ${msg.toast_msg ? escapeHtml(msg.toast_msg) : `${escapeHtml(msg.user)} 开通了 ${guardName}`}
                    </div>
                </div>
            `;
            appendMessage(div);
        }

        function handleSuperchatDelete(data) {
            const ids = data.ids || [];
            ids.forEach(id => {
                const el = document.querySelector(`[data-sc-id="${id}"]`);
                if (el) {
                    el.style.opacity = '0.3';
                    el.style.textDecoration = 'line-through';
                }
            });
        }

        // Start
        init();
    </script>
</body>
</html>
