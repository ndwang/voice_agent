# Bilibili Live Chat Service Configuration

service:
  host: 0.0.0.0
  port: 8002
  log_level: INFO

bilibili:
  room_id: 1856101651
  sessdata: ""
  danmaku_max_buffer: 60
  paid_max_buffer: 100
  enabled: true  # Auto-start connection on service launch
  danmaku_enabled_default: true
  paid_enabled_default: true
  reconnect_delay_seconds: 1.0
  reconnect_max_delay_seconds: 30.0

# Dashboard settings
dashboard:
  default_theme: dark
  default_max_messages: 20
  default_font_size: 16
